name: Test
on: [push, pull_request]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -e '.[training,dev]'
      - run: ruff check .
      - run: mypy src/mamv_model
      - run: pytest -q
