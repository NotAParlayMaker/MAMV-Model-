name: Test
on: [push, pull_request]
jobs:
  unit:
    runs-on: ubuntu-latest
    strategy: {matrix: {python-version: ['3.10', '3.11']}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '${{ matrix.python-version }}', cache: pip}
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: python -m json.tool schemas/dataset-manifest-v1.json >/dev/null
      - run: pytest -q -m 'not training'
  training-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: pip}
      - run: pip install -e '.[training,dev]'
      - run: pytest -q tests/test_training_smoke.py
